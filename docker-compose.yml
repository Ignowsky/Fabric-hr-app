services:
  api:
    build: 
      context: ./fabric-hr-api
      dockerfile: Dockerfile
    container_name: hr_api_service
    ports:
      - "8000:8000"
    env_file: .env
    restart: always

  frontend:
    build: 
      context: ./fabric-hr-app
      dockerfile: Dockerfile
    container_name: hr_ui_service
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - api
    restart: always